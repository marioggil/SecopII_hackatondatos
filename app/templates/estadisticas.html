<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Estadísticas SECOP II</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { padding: 40px; background-color: var(--color-bg-main); }
    .stats-page-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin-top: 40px; }
    .stat-main-card { background: var(--color-bg-card); padding: 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); text-align: center; border-left: 5px solid var(--color-primary-medium); }
    .stat-main-card h3 { color: var(--color-text-secondary); margin-bottom: 15px; font-size: 1.2rem; }
    .stat-main-card .value { font-size: 3rem; font-weight: 800; color: var(--color-primary-dark); }
  </style>
</head>
<body>
    <div hx-get="/html/header" hx-trigger="load" hx-swap="innerHTML" class="title" id="title"></div>

    <div style="max-width: 1200px; margin: 0 auto;">
        <h1 style="margin-top: 40px; color: var(--color-primary-dark);">Resumen Global de Datos</h1>
        <p style="color: var(--color-text-secondary);">Estado actual de la base de datos centralizada.</p>

        <div class="stats-page-grid">
            <div class="stat-main-card">
                <h3>Total Entidades</h3>
                <p class="value">{{ stats.entidades }}</p>
            </div>
            <div class="stat-main-card" style="border-left-color: var(--color-accent-green);">
                <h3>Total Proveedores</h3>
                <p class="value">{{ stats.proveedores }}</p>
            </div>
            <div class="stat-main-card" style="border-left-color: var(--color-error);">
                <h3>Proveedores Sancionados</h3>
                <p class="value">{{ stats.sancionados }}</p>
            </div>
            <div class="stat-main-card" style="border-left-color: var(--color-accent-purple);">
                <h3>Total Contratos</h3>
                <p class="value">{{ stats.contratos }}</p>
            </div>
        </div>
    </div>
</body>
</html>
