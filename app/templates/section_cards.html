<div hx-get="/html/index_info" hx-trigger="load" hx-swap="innerHTML" class="card card-xlarge"></div>

{% for entidad in top_entidades %}
<div class="card" style="padding: 10px;">
  <div class="container">
    <h4 style="font-size: 1.1em; margin-bottom: 8px;"><b>{{ entidad.nombre }}</b></h4>
    <p style="margin: 4px 0;"><b>{{ entidad.contratos }}</b> Contratos</p>
    <p style="margin: 4px 0; color: var(--color-success); font-weight: bold; font-size: 1.1em;">
      ${{ "{:,.0f}".format(entidad.valor).replace(',', '.') }} COP
    </p>
  </div>
</div>
{% endfor %}
