<div style="display: flex; flex-direction: column; height: calc(100vh - 80px); width: 100%; position: relative;">
    <!-- Header de Filtros -->
    <div id="header-filtros" style="background: white; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; overflow-x: auto; overflow-y: hidden;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--color-border); padding-bottom: 10px; margin-bottom: 15px;">
            <h3 style="margin: 0; color: var(--color-primary-dark); font-size: 1.2rem; white-space: nowrap;">Filtros del Grafo</h3>
            <button onclick="toggleFiltros()" style="background: transparent; border: none; font-size: 1.5rem; cursor: pointer; color: var(--color-text-secondary); line-height: 1;" title="Ocultar filtros">&times;</button>
        </div>
        
        <form id="filtros-grafo" hx-get="/html/graph_rel/" hx-target="#graph-container" hx-trigger="change, submit" style="display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end;">
            
            <div style="min-width: 180px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; color: var(--color-text-secondary);">Estado del Contrato</label>
                <select name="estado_contrato" hx-get="/html/opciones_filtros/?campo=estado_contrato" hx-target="this" hx-trigger="load" style="width: 100%; padding: 8px; border: 1px solid var(--color-border); border-radius: 4px; font-family: inherit;">
                    <option value="">Cargando...</option>
                </select>
            </div>

            <div style="min-width: 180px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; color: var(--color-text-secondary);">Modalidad</label>
                <select name="modalidad_contratacion" hx-get="/html/opciones_filtros/?campo=modalidad_contratacion" hx-target="this" hx-trigger="load" style="width: 100%; padding: 8px; border: 1px solid var(--color-border); border-radius: 4px; font-family: inherit;">
                    <option value="">Cargando...</option>
                </select>
            </div>

            <div style="min-width: 180px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; color: var(--color-text-secondary);">Tipo de Contrato</label>
                <select name="tipo_contrato" hx-get="/html/opciones_filtros/?campo=tipo_contrato" hx-target="this" hx-trigger="load" style="width: 100%; padding: 8px; border: 1px solid var(--color-border); border-radius: 4px; font-family: inherit;">
                    <option value="">Cargando...</option>
                </select>
            </div>

            <div style="min-width: 180px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; color: var(--color-text-secondary);">Justificación de la Modalidad</label>
                <select name="justificacion_modalidad" hx-get="/html/opciones_filtros/?campo=justificacion_modalidad" hx-target="this" hx-trigger="load" style="width: 100%; padding: 8px; border: 1px solid var(--color-border); border-radius: 4px; font-family: inherit;">
                    <option value="">Cargando...</option>
                </select>
            </div>

            <div style="min-width: 200px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; color: var(--color-text-secondary);">Rango de Monto (COP)</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" name="valor_minimo" placeholder="Min: 50000000" style="width: 50%; padding: 8px; border: 1px solid var(--color-border); border-radius: 4px; font-family: inherit;">
                    <input type="number" name="valor_maximo" placeholder="Max: 200000000" style="width: 50%; padding: 8px; border: 1px solid var(--color-border); border-radius: 4px; font-family: inherit;">
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn primary" style="background: var(--color-primary-medium);">Aplicar</button>
                <button type="reset" class="btn" style="background: transparent; color: var(--color-text-secondary); border: 1px solid var(--color-border);" onclick="setTimeout(() => htmx.trigger('#filtros-grafo', 'submit'), 50)">Limpiar</button>
            </div>
        </form>
    </div>

    <!-- Contenedor del Grafo -->
    <div id="graph-container" style="flex: 1; position: relative; overflow: hidden; background: #f0f2f5; display: flex; flex-direction: column;" hx-get="/html/graph_rel/" hx-trigger="load">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--color-text-secondary);">Cargando grafo...</div>
    </div>
</div>

<!-- Botón Flotante para mostrar filtros (para responsive) -->
<button id="btn-show-filtros" onclick="toggleFiltros()" style="position: fixed; top: 80px; right: 15px; z-index: 9999; background: var(--color-primary-dark); border: none; border-radius: 4px; padding: 10px 15px; cursor: pointer; box-shadow: var(--shadow-md); font-weight: bold; color: white; transition: all 0.2s ease;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='var(--shadow-lg)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='var(--shadow-md)'">
    &#9776; Filtros
</button>

<script>
function toggleFiltros() {
    const header = document.getElementById('header-filtros');
    const btn = document.getElementById('btn-show-filtros');
    if (header.style.display === 'none') {
        header.style.display = 'block';
        btn.style.display = 'none';
    } else {
        header.style.display = 'none';
        btn.style.display = 'block';
    }
}
</script>
