version: "3.8"

services:
  fastapi:
    build: 
      context: .
      dockerfile: Dockerfile.app
    container_name: secop_fastapi
    ports:
      - "5021:5021"
    environment:
      # Pydal requiere "postgres://..." (no postgresql://). 
      # Dokploy leerá esta variable acá si no sobreescribes DATABASE_URL en su UI.
      # Como tú ya tienes el servicio "postgres_gis_vector", esto apuntará directo.
      - DATABASE_URL=${DATABASE_URL:-postgres://usuario:password@postgres_gis_vector:5432/base_datos}
    volumes:
      - ./app/databases:/app/app/databases
    restart: unless-stopped
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
